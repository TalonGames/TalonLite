<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="display: block; background: #191724; overflow: hidden;">
<style>
  @import url('https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css');
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Poppins", sans-serif; background-color: #191724; }
  .container { display: flex; flex-direction: column; height: 100vh; color: #e0def4; justify-content: center; align-items: center; text-align: center; }
  .shutdown-box { padding: 40px; border-radius: 24px; border: 1px solid #26233a; background-color: #1f1d2e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .shutdown-box i { font-size: 64px; color: #eb6f92; margin-bottom: 20px; display: block; }
  .shutdown-box h1 { margin: 0; font-size: 32px; font-weight: bold; letter-spacing: -1px; }
  .shutdown-box p { color: #6e6a86; margin-top: 8px; font-size: 16px; }
  ::selection { background-color: #403d52; }
</style>
<foreignObject x="0" y="0" width="100%" height="100%">
  <body xmlns="http://www.w3.org/1999/xhtml">
    <div class="container">
      <div class="shutdown-box">
        <i class="ph-bold ph-power"></i>
        <h1>Shut down till next year</h1>
        <p>See you in 2027.</p>
      </div>
    </div>
  </body>
</foreignObject>
</svg>
